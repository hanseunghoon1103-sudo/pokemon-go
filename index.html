<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리얼 포켓몬 GO 웹앱</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #222; color: #fff; text-align: center; }
        #status { padding: 20px; background: rgba(0,0,0,0.7); position: fixed; top: 0; width: 100%; z-index: 10; font-size: 14px; }
        #camera-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #ar-item { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; cursor: pointer; transition: transform 0.2s; }
        #ar-item:active { transform: translate(-50%, -50%) scale(0.8); }
        .btn { background: #ffcb05; color: #3267b2; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 25px; margin-top: 40vh; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 상태 표시창 -->
    <div id="status">대기 중... 위치 권한과 카메라 권한이 필요합니다.</div>

    <!-- 게임 시작 버튼 (브라우저 보안상 유저가 직접 클릭해야 카메라가 켜집니다) -->
    <div id="start-screen">
        <button class="btn" onclick="initGame()">게임 시작하기 🎮</button>
    </div>

    <!-- 카메라 화면 및 AR 아이템 배치 구역 -->
    <div id="camera-container" style="display: none;">
        <video id="video" autoplay playsinline></video>
        <!-- 스프레드시트에서 가져온 이미지가 여기에 띄워집니다 -->
        <img id="ar-item" src="" alt="아이템" onclick="catchItem()">
    </div>

    <script>
        // ⚠️ 본인의 구글 앱스 스크립트 웹앱 URL로 교체하세요!
        const GAS_URL = "https://script.google.com/a/macros/koreanair.com/s/AKfycbydPOt4wm0ZHHCotU8Mn6g5pGdFWFkWjPeTZ4enoXlDjCk6pRIZlAhuM342HgxRde9tWA/exec"; 
        
        let items = [];
        let userLat = 0;
        let userLng = 0;
        let currentNearbyItem = null;

        // 1. 게임 초기화 (카메라 및 GPS 켜기)
        async function initGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('camera-container').style.display = 'block';
            updateStatus("구글 시트에서 아이템 정보를 불러오는 중...");

            // 구글 시트 데이터 가져오기
            try {
                const res = await fetch(GAS_URL);
                const json = await res.json();
                if(json.status === "success") {
                    items = json.data;
                    updateStatus(`아이템 ${items.length}개 로드 완료! GPS 연결 중...`);
                    startLocationTracking();
                    startCamera();
                }
            } catch (err) {
                updateStatus("데이터 로딩 실패: " + err);
            }
        }

        // 2. 스마트폰 카메라 구동
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                document.getElementById('video').srcObject = stream;
            } catch (err) {
                alert("카메라 권한이 필요하거나 지원하지 않는 브라우저입니다.");
            }
        }

        // 3. 실시간 GPS 추적
        function startLocationTracking() {
            if (!navigator.geolocation) {
                updateStatus("이 기기는 GPS를 지원하지 않습니다.");
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    userLat = position.coords.latitude;
                    userLng = position.coords.longitude;
                    checkNearbyItems();
                },
                (err) => { updateStatus("GPS 오류: " + err.message); },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        // 4. 두 좌표 사이의 거리 계산 (하버사인 공식)
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371e3; // 지구 반지름 (미터)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // 미터 단위 리턴
        }

        // 5. 주변에 아이템이 있는지 검사
        function checkNearbyItems() {
            let found = false;
            
            for (let item of items) {
                const dist = getDistance(userLat, userLng, item.latitude, item.longitude);
                
                // 설정한 크기(반경)가 없으면 기본 15미터 이내 접근 시 출현
                const limitDist = item.size ? parseFloat(item.size) : 15; 

                if (dist <= limitDist) {
                    updateStatus(`🚨 근처에 [${item.name}]이(가) 나타났습니다! (거리: ${Math.round(dist)}m)`);
                    showARItem(item);
                    found = true;
                    break; 
                }
            }

            if (!found) {
                updateStatus(`주변 탐색 중... 내 위치: ${userLat.toFixed(5)}, ${userLng.toFixed(5)}`);
                document.getElementById('ar-item').style.display = 'none';
                currentNearbyItem = null;
            }
        }

        // 6. 화면에 아이템 이미지 띄우기
        function showARItem(item) {
            if (currentNearbyItem?.id === item.id) return; // 이미 떠 있는 아이템이면 패스
            currentNearbyItem = item;
            
            const imgElement = document.getElementById('ar-item');
            imgElement.src = item.imageUrl;
            imgElement.style.display = 'block';
            
            // 진동 알림 (지원하는 안드로이드 기기만)
            if (navigator.vibrate) navigator.vibrate(500);
        }

        // 7. 아이템 클릭 시 잡기 (구글 시트에 POST 요청)
        async function catchItem() {
            if (!currentNearbyItem) return;
            
            updateStatus(`진행 중... ${currentNearbyItem.name} 잡는 중!`);
            document.getElementById('ar-item').style.display = 'none';

            const payload = {
                userId: "Trainer_Hong", // 유저 아이디 임의 설정
                itemId: currentNearbyItem.id,
                itemName: currentNearbyItem.name
            };

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                
                if (json.status === "success") {
                    alert(`🎉 축하합니다! ${currentNearbyItem.name}을(를) 잡아서 인벤토리에 저장했습니다!`);
                } else {
                    alert("저장 실패: " + json.message);
                }
            } catch (err) {
                alert("통신 에러로 놓쳤습니다: " + err);
            }
        }

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }
    </script>
</body>
</html>
